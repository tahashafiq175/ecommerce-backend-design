<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>User Login</title>

    <link rel="stylesheet" href="css/login.css">

</head>


<body>


<!-- Admin Login Button -->

<button class="admin-btn"
        onclick="window.location.href='admin-login.html'">

    Admin Login

</button>



<!-- User Login Card -->

<div class="login-container">


    <h1>
        E-Commerce Store
    </h1>


    <h2>
        User Login
    </h2>



    <input
        type="text"
        id="username"
        placeholder="Username">



    <input
        type="password"
        id="password"
        placeholder="Password">



    <button
        class="login-btn"
        onclick="login()">

        Login

    </button>



</div>



<script src="js/login.js"></script>


</body>

</html>
